#config-version=FGT100F-7.2.5-FW-build1517-230830:opmode=0:vdom=0:user=admin
#conf_file_ver=1993246252

config system global
    set hostname "SAMPLE-ALL-FINDINGS"
    set timezone 03
    set admintimeout 480
end

config system dns
end

config system admin
    edit "admin"
        set accprofile "super_admin"
        set vdom "root"
        set password ENC xxx
        set two-factor disable
    next
    edit "admin2"
        set accprofile "super_admin"
        set vdom "root"
        set password ENC xxx
        set two-factor disable
    next
end

config system interface
    edit "wan1"
        set vdom "root"
        set ip 203.0.113.1 255.255.255.252
        set type physical
        set role wan
    next
    edit "wan2"
        set vdom "root"
        set ip 198.51.100.1 255.255.255.252
        set type physical
        set role wan
    next
    edit "dmz"
        set vdom "root"
        set ip 10.1.1.1 255.255.255.0
        set type physical
        set role dmz
    next
    edit "lan"
        set vdom "root"
        set ip 10.10.0.1 255.255.0.0
        set type physical
        set role lan
    next
    edit "servers"
        set vdom "root"
        set ip 10.20.1.1 255.255.255.0
        set type physical
        set role lan
    next
    edit "dev"
        set vdom "root"
        set ip 10.40.1.1 255.255.255.0
        set type physical
        set role lan
    next
    edit "guest"
        set vdom "root"
        set ip 192.168.100.1 255.255.255.0
        set type physical
        set role lan
    next
    edit "mgmt"
        set vdom "root"
        set ip 10.99.1.1 255.255.255.0
        set type physical
        set allowaccess https ssh ping
    next
end

config system zone
    edit "WAN"
        config member
            edit 1
                set interface-name "wan1"
            next
            edit 2
                set interface-name "wan2"
            next
        end
    next
    edit "LAN"
        config member
            edit 1
                set interface-name "lan"
            next
        end
    next
end

config user local
    edit "localuser1"
        set type password
    next
    edit "localuser2"
        set type password
    next
end

config user group
    edit "VPN_Users"
        set member "localuser1"
    next
end

config vpn ipsec phase1-interface
    edit "Weak_Tunnel"
        set interface "wan1"
        set peertype any
        set net-device disable
        set proposal des-md5 3des-sha1
        set dhgrp 2
        set ike-version 1
        set remote-gw 203.0.113.99
        set psksecret ENC xxx
    next
end

config vpn ipsec phase2-interface
    edit "Weak_Tunnel"
        set phase1name "Weak_Tunnel"
        set proposal des-md5
        set pfs disable
        set src-subnet 10.10.0.0 255.255.0.0
        set dst-subnet 10.50.0.0 255.255.255.0
    next
end

config firewall address
    edit "all"
        set subnet 0.0.0.0 0.0.0.0
    next
    edit "DMZ_Net"
        set subnet 10.1.1.0 255.255.255.0
    next
    edit "LAN_Net"
        set subnet 10.10.0.0 255.255.0.0
    next
    edit "Server_Net"
        set subnet 10.20.1.0 255.255.255.0
    next
    edit "Dev_Net"
        set subnet 10.40.1.0 255.255.255.0
    next
    edit "Guest_Net"
        set subnet 192.168.100.0 255.255.255.0
    next
    edit "Unused_Addr_1"
        set subnet 192.168.200.1 255.255.255.255
    next
    edit "Unused_Addr_2"
        set subnet 192.168.200.2 255.255.255.255
    next
end

config firewall addrgrp
    edit "DMZ_Group"
        set member "DMZ_Net"
    next
end

config firewall service custom
    edit "HTTP"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 80
    next
    edit "HTTPS"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 443
    next
    edit "RDP"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 3389
    next
    edit "SMB"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 445
    next
    edit "SSH"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 22
    next
    edit "MYSQL"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 3306
    next
    edit "Unused_Svc_1"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 9999
    next
end

config firewall service group
    edit "Web"
        set member "HTTP" "HTTPS"
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 203.0.113.2
        set device "wan1"
    next
end

config firewall policy
    edit 1
        set name "ANY-ANY-ANY-Dangerous"
        set srcintf "lan"
        set dstintf "servers"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set logtraffic disable
    next
    edit 2
        set name "Internet-to-DMZ"
        set srcintf "wan1" "wan2"
        set dstintf "dmz"
        set srcaddr "all"
        set dstaddr "DMZ_Net"
        set service "Web"
        set action accept
        set nat enable
    next
    edit 3
        set name "Internet-Direct-to-LAN"
        set srcintf "wan1"
        set dstintf "lan"
        set srcaddr "all"
        set dstaddr "LAN_Net"
        set service "SSH" "RDP"
        set action accept
        set nat enable
    next
    edit 4
        set name "DMZ-to-Servers"
        set srcintf "dmz"
        set dstintf "servers"
        set srcaddr "DMZ_Net"
        set dstaddr "Server_Net"
        set service "MYSQL"
        set action accept
    next
    edit 5
        set name "LAN-to-Servers"
        set srcintf "lan"
        set dstintf "servers"
        set srcaddr "LAN_Net"
        set dstaddr "Server_Net"
        set service "RDP" "SMB"
        set action accept
    next
    edit 6
        set name "Guest-to-Servers-Wrong"
        set srcintf "guest"
        set dstintf "servers"
        set srcaddr "Guest_Net"
        set dstaddr "Server_Net"
        set service "ALL"
        set action accept
    next
    edit 7
        set name "Dev-to-Prod-Leak"
        set srcintf "dev"
        set dstintf "servers"
        set srcaddr "Dev_Net"
        set dstaddr "Server_Net"
        set service "ALL"
        set action accept
    next
    edit 8
        set name "Restrict-only-specific-access"
        set srcintf "lan"
        set dstintf "dmz"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
    next
    edit 9
        set name "Disabled-Rule"
        set srcintf "dmz"
        set dstintf "lan"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status disable
    next
    edit 10
        set name "Redundant-A"
        set srcintf "lan"
        set dstintf "dmz"
        set srcaddr "LAN_Net"
        set dstaddr "DMZ_Net"
        set service "HTTP"
        set action accept
    next
    edit 11
        set name "Redundant-B"
        set srcintf "lan"
        set dstintf "dmz"
        set srcaddr "LAN_Net"
        set dstaddr "DMZ_Net"
        set service "HTTP"
        set action accept
    next
end
