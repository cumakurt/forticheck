#config-version=FGT60F-7.2.5-FW-build1517-230830:opmode=0:vdom=0:user=admin
#conf_file_ver=1993246252

config system global
    set hostname "FW-CORP-01"
    set timezone 03
end

config system admin
    edit "admin"
        set accprofile "super_admin"
        set vdom "root"
        set password ENC ...
    next
    edit "audit_user"
        set accprofile "audit_read_only"
        set vdom "root"
        set password ENC ...
    next
    edit "bad_admin"
        set accprofile "super_admin"
        set vdom "root"
        set password ENC ...
        set two-factor disable
    next
end

config system interface
    edit "wan1"
        set vdom "root"
        set ip 203.0.113.1 255.255.255.252
        set type physical
        set description "Internet Uplink"
    next
    edit "wan2"
        set vdom "root"
        set ip 198.51.100.1 255.255.255.252
        set type physical
        set description "Backup Internet"
    next
    edit "dmz"
        set vdom "root"
        set ip 10.1.1.1 255.255.255.0
        set type physical
        set description "DMZ Web Servers"
    next
    edit "internal"
        set vdom "root"
        set ip 10.10.0.1 255.255.0.0
        set type physical
        set description "Internal LAN"
    next
    edit "servers"
        set vdom "root"
        set ip 10.20.1.1 255.255.255.0
        set type physical
        set description "Server VLAN"
    next
    edit "dc"
        set vdom "root"
        set ip 10.30.1.1 255.255.255.0
        set type physical
        set description "Domain Controllers"
    next
    edit "guest"
        set vdom "root"
        set ip 192.168.100.1 255.255.255.0
        set type physical
        set description "Guest WiFi"
    next
    edit "mgmt"
        set vdom "root"
        set ip 10.99.1.1 255.255.255.0
        set type physical
        set description "Management"
    next
end

config user local
    edit "jdoe"
        set type password
        set two-factor disable
        set email-to "jdoe@example.com"
    next
    edit "guest01"
        set type password
    next
end

config user group
    edit "VPN_Users"
        set member "jdoe"
    next
end

config vpn ipsec phase1-interface
    edit "To_Branch_Office"
        set interface "wan1"
        set peertype any
        set net-device disable
        set proposal aes128-sha256 aes256-sha256
        set dhgrp 14 5
        set remote-gw 198.51.100.5
        set psksecret ENC ...
    next
    edit "Legacy_Tunnel_Weak"
        set interface "wan1"
        set peertype any
        set net-device disable
        set proposal des-md5 3des-sha1
        set dhgrp 2
        set remote-gw 203.0.113.99
        set psksecret ENC ...
    next
end

config vpn ipsec phase2-interface
    edit "To_Branch_Office"
        set phase1name "To_Branch_Office"
        set proposal aes128-sha1 aes256-sha1
        set dhgrp 14 5
        set src-subnet 10.10.0.0 255.255.0.0
        set dst-subnet 10.50.0.0 255.255.0.0
    next
    edit "Legacy_Tunnel_Weak"
        set phase1name "Legacy_Tunnel_Weak"
        set proposal des-md5
        set pfs disable
        set src-subnet 10.10.0.0 255.255.0.0
        set dst-subnet 10.99.99.0 255.255.255.0
    next
end

config system zone
    edit "WAN"
        config member
            edit 1
                set interface-name "wan1"
            next
            edit 2
                set interface-name "wan2"
            next
        end
    next
end

config firewall address
    edit "all"
        set subnet 0.0.0.0 0.0.0.0
    next
    edit "DMZ_WebServer_01"
        set subnet 10.1.1.10 255.255.255.255
    next
    edit "DMZ_WebServer_02"
        set subnet 10.1.1.11 255.255.255.255
    next
    edit "DMZ_Network"
        set subnet 10.1.1.0 255.255.255.0
    next
    edit "Internal_Network"
        set subnet 10.10.0.0 255.255.0.0
    next
    edit "Server_Network"
        set subnet 10.20.1.0 255.255.255.0
    next
    edit "DC_Network"
        set subnet 10.30.1.0 255.255.255.0
    next
    edit "Guest_Network"
        set subnet 192.168.100.0 255.255.255.0
    next
    edit "DB_Server_01"
        set subnet 10.20.1.50 255.255.255.255
    next
    edit "DB_Server_02"
        set subnet 10.20.1.51 255.255.255.255
    next
    edit "DC_01"
        set subnet 10.30.1.10 255.255.255.255
    next
    edit "DC_02"
        set subnet 10.30.1.11 255.255.255.255
    next
    edit "Mgmt_Network"
        set subnet 10.99.1.0 255.255.255.0
    next
end

config firewall addrgrp
    edit "DMZ_Servers"
        set member "DMZ_WebServer_01" "DMZ_WebServer_02"
    next
    edit "DB_Servers"
        set member "DB_Server_01" "DB_Server_02"
    next
    edit "Domain_Controllers"
        set member "DC_01" "DC_02"
    next
end

config firewall service custom
    edit "HTTPS"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 443
    next
    edit "HTTP"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 80
    next
    edit "SSH"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 22
    next
    edit "RDP"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 3389
    next
    edit "MYSQL"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 3306
    next
    edit "SMB"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 445
    next
    edit "DNS"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 53
    next
    edit "LDAP"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 389
    next
    edit "LDAPS"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 636
    next
    edit "MSSQL"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 1433
    next
    edit "WinRM"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 5985
    next
end

config firewall service group
    edit "Web_Services"
        set member "HTTP" "HTTPS"
    next
    edit "DB_Services"
        set member "MYSQL" "MSSQL"
    next
    edit "AD_Services"
        set member "LDAP" "LDAPS" "DNS"
    next
end

config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 203.0.113.2
        set device "wan1"
        set distance 10
    next
    edit 2
        set dst 0.0.0.0 0.0.0.0
        set gateway 198.51.100.2
        set device "wan2"
        set distance 20
    next
end

config firewall policy
    edit 1
        set name "Internet-to-DMZ-Web"
        set srcintf "wan1" "wan2"
        set dstintf "dmz"
        set srcaddr "all"
        set dstaddr "DMZ_Servers"
        set service "Web_Services"
        set action accept
        set nat enable
        set logtraffic all
        set av-profile "default"
        set ips-sensor "default"
        set webfilter-profile "default"
        set ssl-ssh-profile "certificate-inspection"
    next
    edit 2
        set name "DMZ-to-DB"
        set srcintf "dmz"
        set dstintf "servers"
        set srcaddr "DMZ_Network"
        set dstaddr "DB_Servers"
        set service "DB_Services"
        set action accept
        set logtraffic all
    next
    edit 3
        set name "Internal-to-Internet"
        set srcintf "internal"
        set dstintf "wan1" "wan2"
        set srcaddr "Internal_Network"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set nat enable
        set logtraffic utm
    next
    edit 4
        set name "DANGEROUS-Any-Any-Any"
        set srcintf "internal"
        set dstintf "servers"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set logtraffic disable
    next
    edit 5
        set name "Guest-to-Internet"
        set srcintf "guest"
        set dstintf "wan1"
        set srcaddr "Guest_Network"
        set dstaddr "all"
        set service "Web_Services" "DNS"
        set action accept
        set nat enable
        set logtraffic all
        set webfilter-profile "guest-filter"
    next
    edit 6
        set name "Servers-to-DC"
        set srcintf "servers"
        set dstintf "dc"
        set srcaddr "Server_Network"
        set dstaddr "Domain_Controllers"
        set service "AD_Services"
        set action accept
        set logtraffic all
    next
    edit 7
        set name "Internal-to-DC-SMB"
        set srcintf "internal"
        set dstintf "dc"
        set srcaddr "all"
        set dstaddr "all"
        set service "SMB" "RDP" "WinRM"
        set action accept
    next
    edit 8
        set name "Old-Unused-Rule"
        set srcintf "dmz"
        set dstintf "internal"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set status disable
    next
    edit 9
        set name "Guest-to-Servers-BLOCKED"
        set srcintf "guest"
        set dstintf "servers"
        set srcaddr "Guest_Network"
        set dstaddr "Server_Network"
        set service "ALL"
        set action deny
        set logtraffic all
    next
    edit 10
        set name "Internet-Direct-to-Internal"
        set srcintf "wan1"
        set dstintf "internal"
        set srcaddr "all"
        set dstaddr "Internal_Network"
        set service "SSH" "RDP"
        set action accept
        set nat enable
    next
    edit 11
        set name "DMZ-to-DC-Direct"
        set srcintf "dmz"
        set dstintf "dc"
        set srcaddr "DMZ_Network"
        set dstaddr "Domain_Controllers"
        set service "LDAP" "SMB"
        set action accept
    next
    edit 12
        set name "Shadow-Test-Duplicate"
        set srcintf "wan1" "wan2"
        set dstintf "dmz"
        set srcaddr "all"
        set dstaddr "DMZ_WebServer_01"
        set service "HTTPS"
        set action accept
        set logtraffic all
    next
    edit 13
        set name "Internal-to-Servers-DB"
        set srcintf "internal"
        set dstintf "servers"
        set srcaddr "Internal_Network"
        set dstaddr "DB_Servers"
        set service "DB_Services"
        set action accept
        set logtraffic all
    next
    edit 14
        set name "Guest-to-DC-Mistake"
        set srcintf "guest"
        set dstintf "dc"
        set srcaddr "Guest_Network"
        set dstaddr "DC_Network"
        set service "ALL"
        set action accept
    next
end
